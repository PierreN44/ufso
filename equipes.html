<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
    }

    #map {
      width: 100%;
      height: 100vh;
    }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  const map = L.map('map').setView([47.3, -0.5], 6);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  // OCR44
  L.marker([47.2639, -1.6778]).addTo(map)
    .bindPopup(`
      <strong>OCR44</strong><br>
      Route De La Trourie<br>
      44880 SAUTRON<br>
      <a href="mailto:obstacleclubracing44@gmail.com">
        obstacleclubracing44@gmail.com
      </a>
    `);

  // Phoenix
  L.marker([47.3941, 0.6848]).addTo(map)
    .bindPopup(`
      <strong>Phoenix</strong><br>
      10 Rue Camille Flammarion<br>
      37000 TOURS<br>
      <a href="mailto:phoenixocr37@gmail.com">
        phoenixocr37@gmail.com
      </a>
    `);
</script>

</body>
</html>
