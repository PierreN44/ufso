<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">

  <title>Carte des contacts OCR</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    #map {
      width: 100%;
      height: 600px;
    }

    .contacts {
      max-width: 1000px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .contact-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .contact-card h3 {
      margin-top: 0;
      color: #222;
    }

    .contact-card a {
      color: #0077cc;
      text-decoration: none;
    }

    .contact-card a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <!-- Carte -->
  <div id="map"></div>

  <!-- Liste des contacts -->
  <div class="contacts">

    <div class="contact-card">
      <h3>OCR44</h3>

      <p>
        <strong>Email :</strong><br>
        <a href="mailto:obstacleclubracing44@gmail.com">
          obstacleclubracing44@gmail.com
        </a>
      </p>

      <p>
        <strong>Adresse :</strong><br>
        Route De La Trourie<br>
        44880 SAUTRON<br>
        France
      </p>
    </div>

    <div class="contact-card">
      <h3>Phoenix</h3>

      <p>
        <strong>Email :</strong><br>
        <a href="mailto:phoenixocr37@gmail.com">
          phoenixocr37@gmail.com
        </a>
      </p>

      <p>
        <strong>Adresse :</strong><br>
        10 Rue Camille Flammarion<br>
        37000 TOURS<br>
        France
      </p>
    </div>

  </div>

  <!-- Leaflet -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script>
    // Initialisation carte
    const map = L.map('map').setView([47.3, -0.5], 6);

    // Fond OpenStreetMap
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // OCR44
    L.marker([47.2639, -1.6778]).addTo(map)
      .bindPopup(`
        <strong>OCR44</strong><br>
        Route De La Trourie<br>
        44880 SAUTRON<br>
        <a href="mailto:obstacleclubracing44@gmail.com">
          obstacleclubracing44@gmail.com
        </a>
      `);

    // Phoenix
    L.marker([47.3941, 0.6848]).addTo(map)
      .bindPopup(`
        <strong>Phoenix</strong><br>
        10 Rue Camille Flammarion<br>
        37000 TOURS<br>
        <a href="mailto:phoenixocr37@gmail.com">
          phoenixocr37@gmail.com
        </a>
      `);
  </script>

</body>
</html>
